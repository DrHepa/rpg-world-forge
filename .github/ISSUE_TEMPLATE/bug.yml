name: Bug report
description: Reproducible runtime, compiler, validator or scaffold defect
title: "[BUG] "
labels:
  - bug
body:
  - type: textarea
    id: outcome
    attributes:
      label: Observed and expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Minimal reproduction
      description: Include command, fixture and complete error without secrets.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Python, OS and raylib versions
    validations:
      required: true
