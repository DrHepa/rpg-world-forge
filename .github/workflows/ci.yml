name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package
        run: python -m pip install -e .
      - name: Compile Python
        run: python -m compileall -q src
      - name: Run headless tests
        run: python -m unittest discover -s tests -v
      - name: Validate neutral release fixture
        run: worldforge validate examples/foundation/source/manifest.json --profile release
      - name: Audit runtime AI boundary
        run: worldforge audit-runtime src/isoworld
