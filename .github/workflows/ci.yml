name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package
        run: python -m pip install -e ".[dev]"
      - name: Lint and formatting
        run: |
          ruff check src tests
          ruff format --check src tests
      - name: Compile Python
        run: python -m compileall -q src
      - name: Run headless tests
        run: python -m unittest discover -s tests -v
      - name: Validate neutral release fixture
        run: worldforge validate examples/foundation/source/manifest.json --profile release
      - name: Analyze neutral narrative fixture
        run: worldforge analyze-narrative examples/foundation/source/manifest.json --fail-on warning
      - name: Audit runtime AI boundary
        run: worldforge audit-runtime src/isoworld
      - name: Build wheel
        run: python -m pip wheel . --no-deps --wheel-dir dist

  raylib-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install runtime with raylib
        run: python -m pip install -e ".[game]"
      - name: Install virtual display
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends xvfb xauth
      - name: Exercise a real hidden raylib window and texture
        run: xvfb-run -a python tests/raylib_smoke.py
