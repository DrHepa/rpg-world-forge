name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  release-readiness:
    name: Release readiness (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - windows-2022
        python-version:
          - "3.11"
          - "3.12"
    steps:
      - name: Check out source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # releases/v4 security backport
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-m5.lock
      - name: Install audited toolchain and Forge
        run: |
          python -m pip install --requirement requirements-m5.lock
          python -m pip install --no-build-isolation --no-deps -e .
          python -m pip check
      - name: Lint and formatting
        run: |
          python -m ruff check src tests scripts
          python -m ruff format --check src tests scripts
      - name: Compile Python
        run: python -m compileall -q src scripts tests
      - name: Run complete headless test suite
        run: python -m unittest discover -s tests -v
      - name: Validate foundation release profile
        run: python -m worldforge validate examples/foundation/source/manifest.json --profile release
      - name: Analyze neutral narrative fixture
        run: >-
          python -m worldforge analyze-narrative
          examples/foundation/source/manifest.json --fail-on warning
      - name: Audit source contracts
        run: python -m worldforge audit-contracts --source-root .
      - name: Audit runtime AI boundary
        run: python -m worldforge audit-runtime src/isoworld
      - name: Audit phase skills
        run: >-
          python -m unittest
          tests.test_m4_game_scaffold.GameSkillLayoutTests -v
      - name: Verify neutral standalone and reproducible releases
        run: python -m scripts.verify_m5_release

  graphical-raylib-smoke:
    name: Graphical raylib smoke (Ubuntu 24.04)
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # releases/v4 security backport
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-m5.lock
      - name: Install audited runtime
        run: |
          python -m pip install --requirement requirements-m5.lock
          python -m pip install --no-build-isolation --no-deps -e .
          python -m pip check
      - name: Install virtual display
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends xvfb xauth
      - name: Exercise graphical raylib runtime under Xvfb
        run: xvfb-run -a python tests/raylib_smoke.py

  windows-raylib-cpu-media-smoke:
    name: Raylib CPU/media smoke (Windows Server 2022)
    runs-on: windows-2022
    steps:
      - name: Check out source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # releases/v4 security backport
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-m5.lock
      - name: Install audited runtime
        run: |
          python -m pip install --requirement requirements-m5.lock
          python -m pip install --no-build-isolation --no-deps -e .
          python -m pip check
      - name: Exercise raylib CPU image encode and decode on Windows
        run: python tests/raylib_cpu_media_smoke.py

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # releases/v4 security backport
        with:
          persist-credentials: false
      - name: Audit exact requirement files
        uses: pypa/gh-action-pip-audit@1220774d901786e6f652ae159f7b6bc8fea6d266 # v1.1.0
        with:
          inputs: >-
            requirements-m5.lock
            src/worldforge/templates/pyray_game/requirements.lock.tmpl
          no-deps: true

  secret-scan:
    name: Gitleaks 8.30.1 full-history scan
    runs-on: ubuntu-24.04
    steps:
      - name: Check out complete history
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # releases/v4 security backport
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Download and verify Gitleaks 8.30.1
        env:
          GITLEAKS_CHECKSUM_FILE_SHA256: 061476c21adaf5441516f96f185c1a4706a83cd6329b9b38762271b3d4a52fae
          GITLEAKS_LINUX_X64_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
        run: |
          set -euo pipefail
          version=8.30.1
          archive="gitleaks_${version}_linux_x64.tar.gz"
          checksums="gitleaks_${version}_checksums.txt"
          base="https://github.com/gitleaks/gitleaks/releases/download/v${version}"
          curl --fail --location --silent --show-error \
            --output "${RUNNER_TEMP}/${checksums}" "${base}/${checksums}"
          printf '%s  %s\n' "${GITLEAKS_CHECKSUM_FILE_SHA256}" "${RUNNER_TEMP}/${checksums}" \
            | sha256sum --check --strict -
          curl --fail --location --silent --show-error \
            --output "${RUNNER_TEMP}/${archive}" "${base}/${archive}"
          grep --fixed-strings --line-regexp \
            "${GITLEAKS_LINUX_X64_SHA256}  ${archive}" "${RUNNER_TEMP}/${checksums}"
          (
            cd "${RUNNER_TEMP}"
            printf '%s  %s\n' "${GITLEAKS_LINUX_X64_SHA256}" "${archive}" \
              | sha256sum --check --strict -
            tar --extract --gzip --file "${archive}" gitleaks
          )
          "${RUNNER_TEMP}/gitleaks" git --no-banner --redact --verbose --log-opts=--all
